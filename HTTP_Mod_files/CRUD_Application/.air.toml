root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main.exe ."
  bin = "./tmp/main.exe"
  full_bin = "./tmp/main.exe"
  include_ext = ["go", "tpl", "tmpl", "html", "env"]
  exclude_dir = ["tmp", "vendor"]
  exclude_file = []
  exclude_regex = [".*_test.go"]
  exclude_unchanged = true
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  send_interrupt = true
  kill_delay = 0
  delay = 0

[color]
  main = "green"
  watcher = "cyan"
  build = "yellow"
  runner = "magenta"

[log]
  time = true
